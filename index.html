<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Productivity</title>
    <!-- Modern Sans-serif font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for standard icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-layout">
        
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon"><i class="fa-solid fa-layer-group"></i></div>
                <h2>Nexus</h2>
            </div>
            
            <nav class="nav-menu">
                <button class="nav-link active" data-view="dashboard">
                    <i class="fa-solid fa-chart-pie"></i> Dashboard
                </button>
                <button class="nav-link" data-view="upcoming">
                    <i class="fa-solid fa-clock"></i> Upcoming Events
                </button>
                <button class="nav-link" data-view="todo">
                    <i class="fa-solid fa-list-check"></i> To-Do List
                </button>
                <button class="nav-link" data-view="pending">
                    <i class="fa-solid fa-hourglass-half"></i> Pending Work
                </button>
                <button class="nav-link" data-view="calendar">
                    <i class="fa-solid fa-calendar-days"></i> Calendar
                </button>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar"></div>
                    <div class="user-info">
                        <h4>Shreyansh</h4>
                        <p>Pro Plan</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- MAIN WORKSPACE -->
        <main class="main-workspace" id="mainWorkspace">
            <!-- Dynamic Content injected via JS Router -->
        </main>
    </div>

    <!-- MODAL FOR ADDING/EDITING TASKS -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Create New Task</h2>
                <button class="btn-close" onclick="closeTaskModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="taskForm">
                <div class="form-group">
                    <label for="taskTitle">Task Title</label>
                    <input type="text" id="taskTitle" placeholder="e.g. Design Landing Page" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="taskDate">Due Date</label>
                        <input type="date" id="taskDate">
                    </div>
                    <div class="form-group">
                        <label for="taskStatus">Status</label>
                        <select id="taskStatus">
                            <option value="pending">Pending</option>
                            <option value="done">Completed</option>
                        </select>
                    </div>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeTaskModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
